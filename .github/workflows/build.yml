name: Build OpenWrt for Tenda RX12L Pro

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update and install
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing build-essential ccache git libncurses-dev python3-setuptools swig libssl-dev gettext rsync gawk unzip libncurses6 libncursesw6

      - name: Setup Python 3.9
        run: |
          git clone https://github.com/pyenv/pyenv.git ~/.pyenv
          export PATH="$HOME/.pyenv/bin:$PATH"
          eval "$(pyenv init -)"
          pyenv install 3.9.19
          pyenv global 3.9.19
          echo "PATH=$HOME/.pyenv/shims:$PATH" >> $GITHUB_ENV

      - name: Clone OpenWrt
        run: git clone --depth 1 -b v23.05.5 https://github.com/openwrt/openwrt.git openwrt

      - name: Copy DTS file
        run: cp patches/dts/mt7981b-tenda-rx12l-pro.dts openwrt/target/linux/mediatek/dts/

      - name: Apply patches
        run: |
          cd openwrt
          sed -i 's/yuncore,ax835)/yuncore,ax835| tenda,rx12l-pro)/g' target/linux/mediatek/filogic/base-files/etc/board.d/02_network
          sed -i 's/yuncore,ax835)/yuncore,ax835| tenda,rx12l-pro)/g' target/linux/mediatek/filogic/base-files/lib/upgrade/platform.sh
          cat ../patches/filogic-addition.mk >> target/linux/mediatek/image/filogic.mk

      - name: Configure
        run: |
          cd openwrt
          echo CONFIG_TARGET_mediatek=y > .config
          echo CONFIG_TARGET_mediatek_filogic=y >> .config
          echo CONFIG_TARGET_mediatek_filogic_Default=y >> .config
          echo CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_tenda_rx12l_pro=y >> .config
          echo CONFIG_PACKAGE_uhttpd=y >> .config
          echo CONFIG_PACKAGE_luci=y >> .config
          echo CONFIG_PACKAGE_luci-app-vlan=y >> .config
          echo CONFIG_PACKAGE_irqbalance=y >> .config
          echo CONFIG_PACKAGE_wpad-mesh-openssl=y >> .config
          echo CONFIG_TARGET_INITRAMFS_COMPRESSION_ZSTD=y >> .config
          make defconfig

      - name: Pre-build verify
        run: |
          cd openwrt
          echo "=== Checking .config ==="
          grep -i "tenda\|rx12l" .config || echo "NOT FOUND in .config"
          echo "=== Checking filogic.mk ==="
          grep -i "tenda" target/linux/mediatek/image/filogic.mk || echo "NOT FOUND in filogic.mk"
          echo "=== Dry-run target/linux ==="
          make --debug=basic -n target/linux/compile 2>&1 | head -10
          echo "=== Verbose config check ==="
          make --debug=verbose -n target/linux/config 2>&1 | head -10

      - name: Build
        run: |
          cd openwrt
          make V=s -j$(nproc) 2>&1 | tee make.log

      - name: Debug list output directory
        run: |
          ls -la openwrt/bin/targets/mediatek/filogic/ || echo "Directory not found"
          find openwrt/bin -name "*.bin" -o -name "*.trx" | head -20
          find openwrt -name "tenda*" -type f 2>/dev/null | head -20

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: openwrt/make.log

      - name: Copy firmware to releases
        if: success()
        run: |
          mkdir -p releases
          FIRMFILE=$(find openwrt/bin/targets/mediatek/filogic -name "tenda_rx12l_pro-*.bin" 2>/dev/null | head -1)
          if [ -n "$FIRMFILE" ]; then
            cp "$FIRMFILE" releases/
            echo "Copied: $FIRMFILE"
          else
            echo "ERROR: Firmware file not found!"
            find openwrt/bin -name "*.bin" -type f | head -10
            exit 1
          fi

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: |
            openwrt/bin/targets/mediatek/filogic/*.bin
            openwrt/bin/targets/mediatek/filogic/*.manifest
