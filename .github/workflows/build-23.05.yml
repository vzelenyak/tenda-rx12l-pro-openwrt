name: Build OpenWrt 23.05 for Tenda RX12L Pro

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update and install
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing build-essential ccache git libncurses-dev python3-setuptools swig libssl-dev gettext rsync gawk unzip libncurses6 libncursesw6

      - name: Clone OpenWrt 23.05
        run: |
          git clone --depth 1 -b v23.05.5 https://github.com/openwrt/openwrt.git openwrt

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy device files
        run: |
          cp patches/23.05/mt7981b-tenda-rx12l-pro.dts openwrt/target/linux/mediatek/dts/

      - name: Apply patches
        run: |
          cd openwrt
          # Add Tenda RX12L Pro to network configuration
          sed -i 's/yuncore,ax835)/yuncore,ax835| tenda,rx12l-pro)/g' target/linux/mediatek/filogic/base-files/etc/board.d/02_network
          # Add Tenda RX12L Pro to platform upgrade
          sed -i 's/yuncore,ax835)/yuncore,ax835| tenda,rx12l-pro)/g' target/linux/mediatek/filogic/base-files/lib/upgrade/platform.sh
          # Add Tenda RX12L Pro device to filogic.mk (check if not exists)
          if ! grep -q "tenda_rx12l-pro" target/linux/mediatek/image/filogic.mk; then
            cat ../patches/23.05/filogic-addition.mk >> target/linux/mediatek/image/filogic.mk
          fi

      - name: Copy tenda-network package
        run: |
          cp -r patches/23.05/package/tenda-network openwrt/package/

      - name: Configure
        run: |
          cd openwrt
          cp ../patches/23.05/.config .config
          make oldconfig

      - name: Pre-build verify
        run: |
          cd openwrt
          echo "=== Checking .config ==="
          grep -i "tenda\|rx12l" .config || echo "NOT FOUND in .config"
          echo "=== Checking filogic.mk ==="
          grep -i "tenda" target/linux/mediatek/image/filogic.mk || echo "NOT FOUND in filogic.mk"

      - name: Build
        run: |
          cd openwrt
          make V=s -j$(nproc) 2>&1 | tee make.log

      - name: Debug list output directory
        run: |
          ls -la openwrt/bin/targets/mediatek/filogic/ || echo "Directory not found"
          find openwrt/bin -name "*.bin" -o -name "*.trx" | head -20
          find openwrt -name "tenda*" -type f 2>/dev/null | head -20

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-23.05
          path: openwrt/make.log

      - name: Copy firmware to releases
        if: success()
        run: |
          mkdir -p releases
          FIRMFILE=$(find openwrt/bin/targets/mediatek/filogic -name "*tenda*rx12l*" 2>/dev/null | head 1)
          if [ -n "$FIRMFILE" ]; then
            cp "$FIRMFILE" releases/
            echo "Copied: $FIRMFILE"
          else
            echo "ERROR: Firmware file not found!"
            find openwrt/bin -name "*.bin" -type f | head -10
            exit 1
          fi

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware-23.05
          path: |
            openwrt/bin/targets/mediatek/filogic/*.bin
            openwrt/bin/targets/mediatek/filogic/*.manifest
